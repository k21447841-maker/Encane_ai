<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - AI Automation Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0B0B1F 0%, #14142B 50%, #1E1E4A 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .offline-container {
            max-width: 400px;
            padding: 40px 30px;
            background: rgba(20, 20, 43, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00F0FF, #8A2BE2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
            }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00F0FF, #8A2BE2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }

        .features {
            margin: 30px 0;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .feature-text {
            flex: 1;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .button {
            display: inline-block;
            padding: 14px 30px;
            background: linear-gradient(135deg, #00F0FF, #8A2BE2);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }

        .retry-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00F0FF;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">📡</div>
        
        <h1>You're Offline</h1>
        
        <p>Don't worry! You can still use some features while offline.</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">💬</div>
                <div class="feature-text">View recent chat history</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📝</div>
                <div class="feature-text">Access saved ideas and plans</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Continue writing drafts</div>
            </div>
        </div>

        <button onclick="retryConnection()" class="button">
            Try Reconnecting
        </button>

        <div class="status">
            <span class="retry-indicator"></span>
            Auto-reconnecting in <span id="countdown">5</span>s
        </div>
    </div>

    <script>
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');

        function retryConnection() {
            window.location.reload();
        }

        function updateCountdown() {
            countdown--;
            if (countdownElement) {
                countdownElement.textContent = countdown;
            }
            
            if (countdown <= 0) {
                retryConnection();
            }
        }

        setInterval(updateCountdown, 1000);

        // Check if online and reload
        window.addEventListener('online', () => {
            window.location.reload();
        });

        // Register service worker for better offline experience
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
